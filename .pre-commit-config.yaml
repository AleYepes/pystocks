repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ./venv/bin/python -m ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: ./venv/bin/python -m ruff format
        language: system
        types: [python]
      # - id: pyright
      #   name: pyright
      #   entry: ./venv/bin/python -m pyright
      #   language: system
      #   pass_filenames: false
      - id: pytest
        name: pytest
        entry: ./venv/bin/python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
